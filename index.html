<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nova</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--surface:#1c1c1f;--surface-hover:#242428;--surface-raised:#28282c;
  --border:#2e2e32;--border-subtle:#232326;
  --accent-r:#e05a2b;--accent-o:#f08040;--accent-y:#f5a623;
  --text-primary:#e8e3dc;--text-secondary:#9e9a94;--text-tertiary:#5a5752;
  --user-bubble:#1e1a16;--input-bg:#1a1a1d;
  --radius-xl:24px;--radius-lg:16px;--radius-md:12px;--radius-sm:8px;--radius-xs:6px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);display:flex;align-items:stretch;justify-content:center}
.ambient{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(120px);opacity:.12}
.ambient-1{width:600px;height:400px;top:-100px;left:50%;transform:translateX(-50%);background:radial-gradient(ellipse,#e05a2b,transparent)}
.ambient-2{width:300px;height:300px;bottom:0;right:0;background:radial-gradient(ellipse,#f08040,transparent);opacity:.06}

/* SHELL */
#shell{display:flex;width:100%;max-width:1200px;height:100vh;position:relative;z-index:1}

/* SIDEBAR WIDE */
#sidebar{
  width:240px;border-right:0.5px solid var(--border-subtle);
  display:flex;flex-direction:column;padding:16px 12px;gap:4px;flex-shrink:0;
  transition:width .25s ease;overflow:hidden;
}
#sidebar.collapsed{width:64px}

.sidebar-header{display:flex;align-items:center;gap:10px;padding:4px 8px 16px;flex-shrink:0}
.sidebar-logo{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(145deg,#2a1508,#1a0d06);
  border:0.5px solid rgba(224,90,43,.35);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(224,90,43,.15);
}
.sidebar-logo img{width:24px;height:24px;object-fit:contain}
.sidebar-title{font-family:'Fraunces',serif;font-size:18px;font-weight:400;font-style:italic;
  background:linear-gradient(135deg,#e8e3dc,#f07840);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;overflow:hidden;}
#sidebar.collapsed .sidebar-title{display:none}

.new-chat-btn{
  display:flex;align-items:center;gap:10px;
  background:rgba(224,90,43,.1);border:0.5px solid rgba(224,90,43,.25);
  border-radius:var(--radius-md);padding:9px 12px;cursor:pointer;
  font-size:13px;color:var(--accent-o);font-family:'DM Sans',sans-serif;
  transition:all .15s;margin-bottom:8px;white-space:nowrap;
}
.new-chat-btn:hover{background:rgba(224,90,43,.18);border-color:rgba(224,90,43,.4)}
.new-chat-btn .btn-icon{font-size:15px;flex-shrink:0}
#sidebar.collapsed .new-chat-btn span:not(.btn-icon){display:none}
#sidebar.collapsed .new-chat-btn{justify-content:center;padding:9px}

.sidebar-section-label{font-size:10px;color:var(--text-tertiary);letter-spacing:.8px;text-transform:uppercase;padding:8px 8px 4px;white-space:nowrap;overflow:hidden}
#sidebar.collapsed .sidebar-section-label{display:none}

/* Chat history list */
#chat-history-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.04) transparent;display:flex;flex-direction:column;gap:2px}
.history-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;
  font-size:13px;color:var(--text-secondary);transition:all .15s;
  position:relative;
}
.history-item:hover{background:var(--surface);color:var(--text-primary)}
.history-item.active{background:rgba(224,90,43,.1);color:var(--accent-o)}
.history-item-icon{font-size:14px;flex-shrink:0}
.history-item-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.history-item-del{
  background:none;border:none;color:var(--text-tertiary);
  cursor:pointer;font-size:16px;padding:0 4px;transition:color .12s;flex-shrink:0;
  opacity:0;transition:opacity .15s,color .15s;line-height:1;
}
.history-item:hover .history-item-del{opacity:1}
.history-item-del:hover{color:#f87171}
#sidebar.collapsed .history-item-title{display:none!important}
#sidebar.collapsed .history-item-del{display:none!important}

.sidebar-divider{height:0.5px;background:var(--border-subtle);margin:8px 0}

.sidebar-bottom{flex-shrink:0;display:flex;flex-direction:column;gap:2px}
.sidebar-nav-btn{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:var(--radius-sm);
  background:none;border:none;cursor:pointer;
  font-size:13px;color:var(--text-tertiary);font-family:'DM Sans',sans-serif;
  transition:all .15s;white-space:nowrap;
}
.sidebar-nav-btn:hover{background:var(--surface);color:var(--text-secondary)}
#sidebar.collapsed .sidebar-nav-btn span:last-child{display:none}
#sidebar.collapsed .sidebar-nav-btn{justify-content:center}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* TOPBAR */
#topbar{
  height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;border-bottom:0.5px solid var(--border-subtle);
}
.topbar-left{display:flex;align-items:center;gap:10px}
.toggle-sidebar-btn{width:32px;height:32px;border-radius:var(--radius-sm);background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);font-size:18px;transition:all .15s}
.toggle-sidebar-btn:hover{background:var(--surface);color:var(--text-secondary)}
.model-selector{display:flex;align-items:center;gap:8px;background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:6px 14px 6px 10px;cursor:pointer;transition:all .15s}
.model-selector:hover{background:var(--surface-hover);border-color:rgba(224,90,43,.3)}
.model-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#e05a2b,#f5a623);box-shadow:0 0 6px rgba(224,90,43,.5)}
.model-name{font-size:13px;font-weight:500;color:var(--text-primary);letter-spacing:-.1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:32px;height:32px;border-radius:var(--radius-sm);background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);font-size:16px;transition:all .15s}
.icon-btn:hover{background:var(--surface);color:var(--text-secondary)}

/* CHAT AREA */
#chat-area{flex:1;overflow-y:auto;padding:32px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent;min-height:0}

/* Welcome */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px 0;min-height:300px}
.welcome-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(145deg,#2a1508,#1a0d06);border:0.5px solid rgba(224,90,43,.3);display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 0 32px rgba(224,90,43,.15);animation:iconFloat 3s ease-in-out infinite}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.welcome-icon img{width:44px;height:44px;object-fit:contain}
.welcome-title{font-family:'Fraunces',serif;font-size:34px;font-weight:400;font-style:italic;letter-spacing:-.5px;background:linear-gradient(135deg,#e8e3dc 20%,#e05a2b 60%,#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.welcome-sub{font-size:15px;color:var(--text-secondary);font-weight:300;line-height:1.6;max-width:400px}
.suggestions{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:32px 24px 0;max-width:680px;margin:0 auto}
.suggestion{display:flex;align-items:center;gap:8px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:10px 16px;cursor:pointer;font-size:13px;color:var(--text-secondary);transition:all .18s;text-align:left;font-family:'DM Sans',sans-serif}
.suggestion:hover{background:var(--surface-hover);border-color:rgba(224,90,43,.3);color:var(--text-primary);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.suggestion-icon{font-size:16px;flex-shrink:0}
.suggestion-text strong{display:block;color:var(--text-primary);font-weight:500;font-size:13px;margin-bottom:1px}
.suggestion-text span{font-size:12px;color:var(--text-tertiary)}

/* Messages */
.msg-wrapper{padding:6px 0;max-width:720px;margin:0 auto;padding-left:24px;padding-right:24px}
.msg-user{display:flex;justify-content:flex-end;margin-bottom:4px}
.msg-user .bubble{background:var(--user-bubble);border:0.5px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) var(--radius-xs) var(--radius-lg);padding:12px 16px;max-width:75%;font-size:14px;line-height:1.65;color:var(--text-primary);animation:msgIn .2s ease both}
.msg-nova{display:flex;align-items:flex-start;gap:12px;margin-bottom:4px}
.nova-avatar{width:30px;height:30px;border-radius:10px;flex-shrink:0;background:linear-gradient(145deg,#2a1508,#1a0d06);border:0.5px solid rgba(224,90,43,.25);display:flex;align-items:center;justify-content:center;margin-top:4px}
.nova-avatar img{width:20px;height:20px;object-fit:contain}
.msg-nova .bubble{background:transparent;padding:8px 0;max-width:85%;font-size:14px;line-height:1.75;color:var(--text-primary);animation:msgIn .2s ease both}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* File attach */
.file-attach-bubble{display:inline-flex;align-items:center;gap:10px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:6px;max-width:260px}
.file-attach-icon{width:32px;height:32px;border-radius:var(--radius-sm);background:rgba(224,90,43,.1);border:0.5px solid rgba(224,90,43,.2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.file-attach-info{min-width:0}
.file-attach-name{font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.file-attach-size{font-size:11px;color:var(--text-tertiary);margin-top:1px}

/* Generated image */
.gen-image-wrap{margin:8px 0}
.gen-image-wrap img{max-width:100%;border-radius:var(--radius-md);border:0.5px solid var(--border);display:block}
.gen-image-actions{display:flex;gap:8px;margin-top:8px}
.gen-image-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--text-secondary);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.gen-image-btn:hover{background:var(--surface-hover);color:var(--text-primary);border-color:rgba(224,90,43,.3)}

/* Typing */
.typing-indicator{display:flex;align-items:center;gap:12px;padding:8px 0;max-width:720px;margin:0 auto;padding-left:24px}
.typing-avatar{width:30px;height:30px;border-radius:10px;flex-shrink:0;background:linear-gradient(145deg,#2a1508,#1a0d06);border:0.5px solid rgba(224,90,43,.25);display:flex;align-items:center;justify-content:center}
.typing-avatar img{width:20px;height:20px;object-fit:contain}
.typing-dots{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text-tertiary);animation:tdot 1.4s infinite ease-in-out}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}

/* INPUT ZONE */
#input-zone{flex-shrink:0;padding:16px 24px 20px;max-width:720px;width:100%;margin:0 auto}
#file-chips{display:none;gap:6px;flex-wrap:wrap;margin-bottom:10px}
#file-chips.visible{display:flex}
.chip{display:flex;align-items:center;gap:6px;background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:4px 10px 4px 8px;font-size:12px;color:var(--text-secondary);animation:msgIn .15s ease both}
.chip-remove{background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:14px;line-height:1;padding:0;transition:color .12s}
.chip-remove:hover{color:#f87171}
.input-box{background:var(--input-bg);border:0.5px solid var(--border);border-radius:var(--radius-xl);padding:12px 12px 12px 16px;display:flex;align-items:flex-end;gap:8px;transition:border-color .2s,box-shadow .2s}
.input-box:focus-within{border-color:rgba(224,90,43,.4);box-shadow:0 0 0 3px rgba(224,90,43,.06)}
#msg-input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--text-primary);font-family:'DM Sans',sans-serif;resize:none;max-height:160px;line-height:1.6;padding:2px 0}
#msg-input::placeholder{color:var(--text-tertiary)}
.input-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.act-btn{width:34px;height:34px;border-radius:var(--radius-sm);background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);font-size:17px;transition:all .15s;font-family:'DM Sans',sans-serif}
.act-btn:hover{background:var(--surface-hover);color:var(--text-secondary)}
.act-btn.img-active{color:var(--accent-o);background:rgba(224,90,43,.1)}
#file-input{display:none}
#send-btn{width:34px;height:34px;border-radius:var(--radius-sm);background:linear-gradient(135deg,#e05a2b,#f08040);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:16px;transition:all .18s;box-shadow:0 2px 12px rgba(224,90,43,.3);flex-shrink:0}
#send-btn:hover{transform:scale(1.06);box-shadow:0 4px 20px rgba(224,90,43,.45)}
#send-btn:active{transform:scale(.95)}
#send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.input-footer{display:flex;justify-content:center;margin-top:10px;font-size:11px;color:var(--text-tertiary);letter-spacing:.2px}

/* IMAGE MODE BANNER */
#img-mode-banner{
  display:none;background:rgba(224,90,43,.08);border:0.5px solid rgba(224,90,43,.2);
  border-radius:var(--radius-md);padding:8px 14px;margin-bottom:10px;
  font-size:12px;color:var(--accent-o);display:none;
  align-items:center;gap:8px;
}
#img-mode-banner.visible{display:flex;flex-direction:column}
.img-opt-btn{font-size:12px;padding:4px 11px;border-radius:20px;cursor:pointer;border:0.5px solid var(--border);background:transparent;color:var(--text-secondary);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.img-opt-btn:hover{background:var(--surface-hover);color:var(--text-primary);border-color:rgba(224,90,43,.3)}
.img-opt-btn.active{background:rgba(224,90,43,.15);border-color:rgba(224,90,43,.4);color:var(--accent-o)}

/* CODE BLOCKS */
.code-block{background:#0d0d10;border:0.5px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin:10px 0;font-size:13px}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:0.5px solid var(--border);background:rgba(255,255,255,.03)}
.code-lang{font-size:11px;color:var(--accent-y);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.copy-btn{background:transparent;border:0.5px solid var(--border);border-radius:var(--radius-xs);padding:3px 10px;font-size:11px;color:var(--text-secondary);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.copy-btn:hover{background:var(--surface-hover);color:var(--text-primary)}
pre{margin:0;padding:16px;overflow-x:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent}
pre code{font-family:'Fira Code','Cascadia Code','Consolas',monospace;font-size:13px;line-height:1.7;color:#c9d1d9}
.inline-code{background:rgba(224,90,43,.1);border:0.5px solid rgba(224,90,43,.2);border-radius:4px;padding:1px 6px;font-family:'Fira Code','Consolas',monospace;font-size:12px;color:var(--accent-y)}
.md-content p{margin-bottom:8px;line-height:1.75}
.md-content p:last-child{margin-bottom:0}
.md-content strong{color:var(--text-primary);font-weight:500}
.md-content ul{padding-left:20px;margin:6px 0}
.md-content li{margin-bottom:4px;line-height:1.65}
.md-content h1,.md-content h2,.md-content h3{font-family:'Fraunces',serif;font-weight:400;color:var(--text-primary);margin:12px 0 6px}
.md-content .md-h1{font-size:20px}
.md-content .md-h2{font-size:17px}
.md-content .md-h3{font-size:15px;color:var(--accent-y)}
</style>
</head>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

  <!-- SIDEBAR -->

// ── MARKDOWN RENDERER ──
function renderMarkdown(text){
  let parts=[], rx=/```(\w*)\n?([\s\S]*?)```/g, last=0, m;
  while((m=rx.exec(text))!==null){
    if(m.index>last)parts.push({type:'text',content:text.slice(last,m.index)});
    parts.push({type:'code',lang:m[1]||'',content:m[2]});
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push({type:'text',content:text.slice(last)});
  let html='';
  parts.forEach(p=>{
    if(p.type==='code'){
      const id='cb_'+Math.random().toString(36).slice(2);
      const esc=escHtml(p.content.trimEnd());
      html+=`<div class="code-block"><div class="code-header"><span class="code-lang">${p.lang||'código'}</span><button class="copy-btn" onclick="copyCode('${id}')">Copiar</button></div><pre id="${id}"><code>${esc}</code></pre></div>`;
    } else {
      let t=escHtml(p.content);
      t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
      t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
      t=t.replace(/`([^`]+)`/g,'<code class="inline-code">$1</code>');
      t=t.replace(/^### (.+)$/gm,'<h3 class="md-h3">$1</h3>');
      t=t.replace(/^## (.+)$/gm,'<h2 class="md-h2">$1</h2>');
      t=t.replace(/^# (.+)$/gm,'<h1 class="md-h1">$1</h1>');
      t=t.replace(/^[\-\*] (.+)$/gm,'<li>$1</li>');
      t=t.replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');
      t=t.replace(/\n\n/g,'</p><p>'); t=t.replace(/\n/g,'<br>');
      t='<p>'+t+'</p>'; t=t.replace(/<p>\s*<\/p>/g,'');
      html+=t;
    }
  });
  return html;
}
function copyCode(id){
  const el=document.getElementById(id); if(!el)return;
  navigator.clipboard.writeText(el.innerText).then(()=>{
    const btn=el.closest('.code-block').querySelector('.copy-btn');
    btn.textContent='✓ Copiado'; btn.style.color='#4ade80';
    setTimeout(()=>{btn.textContent='Copiar';btn.style.color='';},2000);
  });
}

          }],
          max_tokens:250, temperature:0.6
        })
      });
      const data=await res.json();
      if(res.ok) finalPrompt=data.choices?.[0]?.message?.content?.trim()||prompt;
    }catch(e){ /* use original */ }
  }

  // Add style suffix
  if(imgStyle) finalPrompt += ', '+imgStyle;

  const seed=Math.floor(Math.random()*999999);
  let url;

  const encoded=encodeURIComponent(finalPrompt);

  } else if(imgEngine==='turbo'){

    url=`https://image.pollinations.ai/prompt/${encoded}?model=flux-schnell&width=${imgWidth}&height=${imgHeight}&seed=${seed}&nologo=true`;

  let userContent=text;
  if(filesSnap.length>0){
    const fl=filesSnap.map(f=>f.name+' ('+formatSize(f.size)+')').join(', ');
    userContent=(text?text+'\n\n':'')+'[Archivos adjuntos: '+fl+']';
  }
  if(userContent.trim()) history.push({role:'user',content:userContent});

  // Set chat title from first message
  if(currentChatId&&allChats[currentChatId]&&allChats[currentChatId].title==='Nueva conversación'){
    allChats[currentChatId].title=text.slice(0,40)+(text.length>40?'…':'');
  }

  busy=true;
  document.getElementById('send-btn').disabled=true;
  addTyping();

  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:SYSTEM},...history],max_tokens:8000,temperature:0.4})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.error?.message||'Error de API');
    const reply=data.choices?.[0]?.message?.content||'No pude generar una respuesta.';
    history.push({role:'assistant',content:reply});
    removeTyping(); addNovaMsg(reply);
    saveCurrentChat();
  }catch(e){
    removeTyping(); addNovaMsg('Error: '+e.message);
  }

  busy=false;
  document.getElementById('send-btn').disabled=false;
}

function quickSend(t){ sendMsg(t); }
function fillInput(t){
  const input=document.getElementById('msg-input');
  input.value=t;
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,160)+'px';
  input.focus();
}

function newChat(){
  history=[]; pendingFiles=[]; hasMessages=false; currentChatId=null;
  disableImageMode();
  const area=document.getElementById('chat-area');
  area.innerHTML=`
    <div id="welcome" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px 0;min-height:300px">
      <div class="welcome-icon"><img src="${LOGO_SRC}" alt="Nova" style="width:44px;height:44px;object-fit:contain"/></div>
      <div class="welcome-title">Hola, soy Nova</div>
      <div class="welcome-sub">Tu asistente de IA. Chatea, genera imágenes o pide código.</div>
    </div>`;
  renderHistoryList();
}

// ── FILE ATTACH ──
document.getElementById('file-input').addEventListener('change',function(){
  Array.from(this.files).forEach(f=>{
    pendingFiles.push(f);
    const chips=document.getElementById('file-chips'); chips.classList.add('visible');
    const chip=document.createElement('div'); chip.className='chip'; chip.dataset.fname=f.name;
    chip.innerHTML=fileIcon(f.name)+' <span>'+escHtml(f.name)+'</span><button class="chip-remove" onclick="removeChip(this,\''+escHtml(f.name)+'\')">×</button>';
    chips.appendChild(chip);
  });
  this.value='';
});
function removeChip(btn,name){
  pendingFiles=pendingFiles.filter(f=>f.name!==name);
  btn.parentElement.remove();
  if(pendingFiles.length===0)document.getElementById('file-chips').classList.remove('visible');
}

// ── TEXTAREA AUTO-RESIZE ──
const ta=document.getElementById('msg-input');
ta.addEventListener('input',function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,160)+'px'; });
ta.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });

// ── INIT ──
loadChats();
</script>
